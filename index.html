<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mine à Bitcoin</title>
<link rel="stylesheet" href="style.css">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<h1>Mine à Bitcoin</h1>

<div id="layout">

  <div id="gameArea">

    <div id="scoreBoard">
      <div>Bitcoin généré : <span id="total">0</span></div>
      <div>Bitcoin obtenue : <span id="cpc">1</span></div>
    </div>

    <button id="clickButton">MINER DU BITCOIN</button>
    <button id="resetButton">RESET</button>

    <h2 style="margin-top:40px;">Boutique</h2>
    <div class="shop" id="shop"></div>

  </div>

  <div id="leaderboard">
    <h2>Classement Top 100 (MONDIAL)</h2>
    <div id="leaderboardList"></div>
    <button id="refreshLeaderboard">Actualiser</button>
  </div>

</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC1nJnq4XngAO8ClRtuG2qvuruZSPlwYHY",
  authDomain: "clickers-8b8ed.firebaseapp.com",
  projectId: "clickers-8b8ed",
  storageBucket: "clickers-8b8ed.firebasestorage.app",
  messagingSenderId: "407217480579",
  appId: "1:407217480579:web:9a9d1770c40e01a4d20cb6"
}

firebase.initializeApp(firebaseConfig)
const db = firebase.firestore()
const auth = firebase.auth()

// VARIABLES
let total = parseInt(localStorage.getItem("total")) || 0
let cpc = parseInt(localStorage.getItem("cpc")) || 1
let pseudo = localStorage.getItem("pseudo")

// AUTH + INIT
async function init(){
  await auth.signInAnonymously()

  if(!pseudo){
    await askPseudo()
  }

  update()
  displayLeaderboard()
}

init()

// PSEUDO UNIQUE
async function askPseudo(){
  while(true){
    let input = prompt("Choisis un pseudo UNIQUE")

    if(!input || input.length < 3){
      alert("Pseudo trop court")
      continue
    }

    input = input.toLowerCase().trim()

    const doc = await db.collection("leaderboard").doc(input).get()

    if(doc.exists){
      alert("Pseudo déjà pris ❌")
    } else {
      pseudo = input
      localStorage.setItem("pseudo", pseudo)
      break
    }
  }
}

// DOM
const totalEl = document.getElementById("total")
const cpcEl = document.getElementById("cpc")
const button = document.getElementById("clickButton")

function formatNumber(n){
  return n.toLocaleString("fr-FR")
}

// EFFET CLIC
const colors = ["#ff0000","#ff7b00","#ffd000","#2ecc71","#00c3ff","#0066ff","#8e44ad","#ff2da0"]

function effect(){
  const rect = button.getBoundingClientRect()
  const span = document.createElement("span")
  span.className="click-effect"
  span.style.color = colors[Math.floor(Math.random()*colors.length)]
  span.textContent="+"+formatNumber(cpc)
  span.style.left = Math.random()*(rect.width-40)+"px"
  span.style.top = Math.random()*(rect.height-40)+"px"
  button.appendChild(span)
  setTimeout(()=>span.remove(),1200)
}

// ANTI SPAM CLIC
let clicks=[]
function checkCPS(){
  let now = Date.now()
  clicks.push(now)
  clicks = clicks.filter(t => now - t < 1000)

  if(clicks.length > 15){
    document.body.classList.add("shake")
    setTimeout(()=>document.body.classList.remove("shake"),300)
  }
}

// CLICK
button.onclick = ()=>{
  if(!pseudo) return

  total += cpc
  checkCPS()
  update()
  effect()
}

// RESET
document.getElementById("resetButton").onclick = ()=>{
  if(confirm("Reset la partie ?")){
    total = 0
    cpc = 1
    update()
  }
}

// SHOP (TES AMÉLIORATIONS INTACTES)
const upgrades = [
  {name:"Amélioration 1",desc:"+1 par clic pour 100 Bitcoin",cost:100,add:1,color:"color1"},
  {name:"Amélioration 2",desc:"+5 par clic pour 500 Bitcoin",cost:500,add:5,color:"color2"},
  {name:"Amélioration 3",desc:"+10 par clic pour 1000 Bitcoin",cost:1000,add:10,color:"color3"},
  {name:"Amélioration 4",desc:"+250 par clic pour 25.000 Bitcoin",cost:25000,add:250,color:"color4"},
  {name:"Amélioration 5",desc:"+5000 par clic pour 500.000 Bitcoin",cost:500000,add:5000,color:"color5"},
  {name:"Amélioration 6",desc:"+10.000 par clic pour 1.000.000 Bitcoin",cost:1000000,add:10000,color:"color6"},
  {name:"Amélioration 7",desc:"+100.000 par clic pour 10.000.000 Bitcoin",cost:10000000,add:100000,color:"color7"},
  {name:"Amélioration 8",desc:"+2.500.000 par clic pour 250 millions Bitcoin",cost:250000000,add:2500000,color:"color8"},
  {name:"Amélioration 9",desc:"+10.000.000 par clic pour 1 milliard Bitcoin",cost:1000000000,add:10000000,color:"color5"},
  {name:"Amélioration 10",desc:"+1.000.000.000 par clic pour 10.000 milliards Bitcoin",cost:10000000000000,add:1000000000,color:"color1"}
]

const shop = document.getElementById("shop")
let buttons = []

upgrades.forEach(u=>{
  const card = document.createElement("div")
  card.className="shop-card"
  card.innerHTML=`
    <div class="shop-title">${u.name}</div>
    <div class="shop-desc">${u.desc}</div>
    <button class="shop-btn ${u.color}">Acheter (${formatNumber(u.cost)})</button>
  `

  const btn = card.querySelector("button")

  btn.onclick = (e)=>{
    e.stopPropagation()
    if(total < u.cost) return

    total -= u.cost
    cpc += u.add
    update()
  }

  buttons.push({btn:btn,upgrade:u})
  shop.appendChild(card)
})

function updateShop(){
  buttons.forEach(item=>{
    if(total >= item.upgrade.cost){
      item.btn.classList.remove("disabled")
    } else {
      item.btn.classList.add("disabled")
    }
  })
}

// LEADERBOARD
function updateLeaderboard(){
  if(!pseudo) return

  db.collection("leaderboard").doc(pseudo).set({
    name:pseudo,
    score: Math.min(cpc, 1000000)
  })
}

function displayLeaderboard(){
  const list = document.getElementById("leaderboardList")
  list.innerHTML="Chargement..."

  db.collection("leaderboard")
    .orderBy("score","desc")
    .limit(100)
    .get()
    .then(snapshot=>{
      list.innerHTML=""
      let i=1

      snapshot.forEach(doc=>{
        const p = doc.data()
        const div = document.createElement("div")
        div.className="leaderboard-item"
        div.innerHTML = `<span>${i}. ${p.name}</span><span>${formatNumber(p.score)}</span>`
        list.appendChild(div)
        i++
      })
    })
}

// REFRESH
document.getElementById("refreshLeaderboard").onclick = displayLeaderboard

// UPDATE
function update(){
  totalEl.textContent = formatNumber(total)
  cpcEl.textContent = formatNumber(cpc)

  localStorage.setItem("total",total)
  localStorage.setItem("cpc",cpc)

  updateShop()
  updateLeaderboard()
}
</script>

</body>
</html>
